name: Claude - Review PR

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install anthropic SDK
        run: pip install anthropic --quiet

      - name: Collect diff and linked issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_BODY: ${{ github.event.pull_request.body }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          git diff "${BASE_SHA}...${HEAD_SHA}" > /tmp/pr.diff

          # Extract issue number from "Closes #N" / "Fixes #N" / "Resolves #N"
          ISSUE_NUMBER=$(echo "$PR_BODY" | grep -oiP '(closes|fixes|resolves)\s+#\K[0-9]+' | head -1)
          echo "ISSUE_NUMBER=${ISSUE_NUMBER}" >> "$GITHUB_ENV"

          if [ -n "$ISSUE_NUMBER" ]; then
            gh issue view "$ISSUE_NUMBER" --json title,body > /tmp/issue.json
            echo "Found linked issue #${ISSUE_NUMBER}"
          else
            echo "No linked issue found in PR body."
          fi

      - name: Review with Claude and post comment
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          ISSUE_NUMBER: ${{ env.ISSUE_NUMBER }}
        run: |
          python3 - << 'PYEOF'
          import os, json, subprocess
          import anthropic

          with open('/tmp/pr.diff') as f:
              diff = f.read()

          issue_context = "No linked issue found."
          try:
              with open('/tmp/issue.json') as f:
                  issue = json.load(f)
              issue_context = f"**Title:** {issue['title']}\n\n**Description:**\n{issue['body']}"
          except FileNotFoundError:
              pass

          # Truncate very large diffs to stay within token limits
          if len(diff) > 12000:
              diff = diff[:12000] + "\n\n[diff truncated — too large to display in full]"

          client = anthropic.Anthropic(api_key=os.environ['ANTHROPIC_API_KEY'])

          message = client.messages.create(
              model="claude-sonnet-4-6",
              max_tokens=1024,
              messages=[{
                  "role": "user",
                  "content": f"""You are reviewing a pull request for **Drinkle**, a Jekyll-based PWA where users silently order cocktails by showing cards to a bartender.

          ## Linked Issue
          {issue_context}

          ## Pull Request Diff
          ```diff
          {diff}
          ```

          Review this PR against the linked issue. Address:
          1. Does the implementation correctly satisfy the issue request?
          2. Are there any bugs, regressions, or missing edge cases?
          3. Does it follow the project conventions (Jekyll data in `_data/drinks.yaml`, shortname slugs for IDs/localStorage/images, no unnecessary complexity)?

          End your review with a clear **APPROVE** or **REQUEST CHANGES** verdict and a one-line reason."""
              }]
          )

          review_body = message.content[0].text
          pr_number = os.environ['PR_NUMBER']

          subprocess.run(
              ['gh', 'pr', 'comment', pr_number, '--body', f'## Claude Code Review\n\n{review_body}'],
              check=True,
          )
          print("Review comment posted.")
          PYEOF
