name: "Claude: Respond"

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  respond:
    # Only respond when someone mentions @claude in a comment
    if: >-
      contains(github.event.comment.body, '@claude')
      && contains(fromJson('["fizal619","plantainchip","saeedjabbar"]'), github.actor)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          allowed_tools: "Edit,Write,Read,Glob,Grep,Bash(bundle exec:*),Bash(mkdir:*),Bash(ls:*),Bash(git add:*),Bash(git commit:*),Bash(git status:*)"
