name: "Claude: Reviewer"

on:
  pull_request:
    types: [opened, synchronize]
    branches: [master]

permissions:
  contents: read
  pull-requests: write
  issues: read

jobs:
  review:
    # Only review PRs created by the developer workflow (claude/* branches)
    if: startsWith(github.head_ref, 'claude/issue-')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Gather context
        id: context
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Extract linked issue number from branch name
          issue_number=$(echo "${{ github.head_ref }}" | sed 's/claude\/issue-//')
          echo "issue_number=${issue_number}" >> "$GITHUB_OUTPUT"

          # Get issue details
          gh issue view "$issue_number" \
            --repo "${{ github.repository }}" \
            --json title,body > /tmp/issue.json

          # Get the full diff
          gh pr diff "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" > /tmp/pr.diff

          # Get list of changed files
          gh pr view "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --json files --jq '.files[].path' > /tmp/changed_files.txt

          # Count prior review rounds to detect iteration depth
          rounds=$(gh api \
            "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews" \
            --jq '[.[] | select(.state == "CHANGES_REQUESTED")] | length')
          echo "review_rounds=${rounds}" >> "$GITHUB_OUTPUT"

      - name: Run Claude Code review
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          ISSUE_TITLE=$(jq -r .title /tmp/issue.json)
          ISSUE_BODY=$(jq -r .body /tmp/issue.json)
          PR_DIFF=$(cat /tmp/pr.diff)
          CHANGED_FILES=$(cat /tmp/changed_files.txt)
          REVIEW_ROUND=${{ steps.context.outputs.review_rounds }}

          claude -p "$(cat <<PROMPT
          You are reviewing pull request #${{ github.event.pull_request.number }}.
          This is review round $((REVIEW_ROUND + 1)).

          ## Original issue #${{ steps.context.outputs.issue_number }}
          **${ISSUE_TITLE}**

          ${ISSUE_BODY}

          ## Changed files
          ${CHANGED_FILES}

          ## Diff
          \`\`\`diff
          ${PR_DIFF}
          \`\`\`

          ## Your role

          You are both a **senior developer** and a **project manager** reviewing
          this pull request. Evaluate it from both perspectives.

          ### Developer review
          - Is the code correct, clean, and minimal?
          - Are there bugs, edge cases, or security issues?
          - Do the tests actually validate the changes?
          - Does the code follow the project conventions from CLAUDE.md?
          - Are there any regressions?

          ### Project manager review
          - Does this PR fully address the original issue?
          - Are there acceptance criteria in the issue that are not met?
          - Is there a recording/screenshot demonstrating the change?
          - Would a user consider this issue resolved after merging?

          ## Output

          Write your review to /tmp/review_body.md — be specific and constructive.
          Reference file paths and line numbers when pointing out issues.

          Then write exactly one word to /tmp/review_decision.txt:
            APPROVE      — if the PR is ready to merge
            REQUEST_CHANGES — if changes are needed

          Be pragmatic: minor style nits alone are not worth blocking a PR.
          Block only for correctness, completeness, or missing tests.
          PROMPT
          )" \
            --allowedTools "Read,Glob,Grep,Write,Bash(bundle exec:*),Bash(cat:*),Bash(ls:*)"

      - name: Submit review
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          decision=$(cat /tmp/review_decision.txt 2>/dev/null | tr -d '[:space:]' | tr '[:lower:]' '[:upper:]')
          body=$(cat /tmp/review_body.md 2>/dev/null || echo "Review could not be generated.")

          # Default to requesting changes if decision file is missing/invalid
          case "$decision" in
            APPROVE)
              gh pr review "${{ github.event.pull_request.number }}" \
                --approve \
                --body "$body" \
                --repo "${{ github.repository }}"
              ;;
            *)
              gh pr review "${{ github.event.pull_request.number }}" \
                --request-changes \
                --body "$body" \
                --repo "${{ github.repository }}"
              ;;
          esac
