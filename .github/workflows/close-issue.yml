name: Close Issue on PR Merge

on:
  pull_request:
    types: [closed]

jobs:
  close-issue:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: read

    steps:
      - name: Close linked issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          ISSUE_NUMBER=$(echo "$PR_BODY" | grep -oiP '(closes|fixes|resolves)\s+#\K[0-9]+' | head -1)

          if [ -z "$ISSUE_NUMBER" ]; then
            echo "No linked issue found in PR #${PR_NUMBER} body — nothing to close."
            exit 0
          fi

          gh issue close "$ISSUE_NUMBER" \
            --comment "Closed automatically — implemented in PR #${PR_NUMBER}."

          echo "Closed issue #${ISSUE_NUMBER}."
