name: Test

on:
  pull_request:
    branches: ["master"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Build site
        run: bundle exec jekyll build

      - name: Validate drinks data
        run: bundle exec ruby test/drinks_test.rb

      - name: Check internal links and images
        run: bundle exec htmlproofer _site --disable-external
